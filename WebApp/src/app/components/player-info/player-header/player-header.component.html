<div
  class="player-header-card"
  [style.border]="'1px solid ' + leagueAccentBorderColor"
  [style.--league-glow-18]="leagueAccentRgba(0.18)"
  [style.--league-glow-12]="leagueAccentRgba(0.12)"
  [style.--league-shadow-16]="leagueAccentRgba(0.16)"
  [style.--league-shadow-hover]="leagueAccentRgba(0.2)">
  @if (badgeCountryName) {
    <div class="player-header-badge-cluster">
      <div class="country-badge" aria-hidden="true">
        @if (badgeCountryFlag) {
          <img
            class="country-flag"
            [src]="badgeCountryFlag"
            [alt]="badgeCountryName + ' flag'"
            width="16"
            height="12">
        }
        <span class="country-name">{{ badgeCountryName }}</span>
      </div>
    </div>
  }

  <div class="player-header-top">
    <div class="player-header-info">
      <div class="player-crest-row">
        @if (currentClubId; as teamId) {
          <a
            class="player-team-mark"
            [routerLink]="['/app/team']"
            [queryParams]="{ id: teamId }"
            [attr.aria-label]="'Open ' + (currentClubName ?? 'team') + ' team page'"
            [style.border]="'2px solid ' + leagueAccentBorderColor">
            <img
              class="player-team-logo"
              [src]="images.getRouteImageTeam(teamId)"
              [alt]="currentClubName ?? 'Team'"
              width="44"
              height="44">
          </a>
        }
        <div
          class="player-avatar"
          [style.border]="'2px solid ' + leagueAccentBorderColor">
          <img
            [src]="getPlayerImageUrl()"
            [alt]="player.player.name"
            width="112"
            height="112"
            class="player-avatar-img"
            (error)="onImageError($event)">
        </div>
      </div>

      <div class="player-main">
        <div class="player-name-row">
          <h1 class="player-name">{{ player.player.name }}</h1>
          <div class="player-basic-info" *ngIf="hasBasicInfo()">
            <span class="info-chip" *ngIf="player.player.position">
              {{ player.player.position }}
            </span>
            <span class="info-chip" *ngIf="player.player.number">
              #{{ player.player.number }}
            </span>
          </div>
        </div>

        <div class="player-meta" *ngIf="hasMetaInfo()">
          <span *ngIf="playerBirthPlace">{{ playerBirthPlace }}</span>
          <span class="dot" aria-hidden="true" *ngIf="playerBirthPlace && playerAge !== null">•</span>
          <span *ngIf="playerAge !== null">Age {{ playerAge }}</span>
        </div>
      </div>
    </div>

    <div class="player-header-stats">
      <app-quick-stats
        [userStats]="playerGeneralStats"
        [userStatsLoaded]="playerGeneralStatsLoaded"
        [containerWidth]="'100%'"
        [showFadeEdges]="true">
      </app-quick-stats>
    </div>
  </div>
</div>
