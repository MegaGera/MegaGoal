<div class="match-reactions" role="group" aria-label="Match reactions">
  <div
    class="reaction-item"
    *ngFor="let reaction of matchReactions; trackBy: trackByReaction">
    <button
      type="button"
      class="reaction-btn"
      [class.is-selected]="isReactionSelected(reaction)"
      [class.is-community-selected]="isReactionSelectedByOthers(reaction)"
      [attr.aria-pressed]="isReactionSelected(reaction)"
      [attr.aria-label]="'Reaction ' + reaction + ', ' + getReactionCount(reaction) + ' total'"
      (click)="toggleReaction(reaction)">
      <span class="reaction-emoji" aria-hidden="true">{{ reaction }}</span>
    </button>
    <span
      class="engagement-count-badge"
      *ngIf="getReactionCount(reaction) > 0"
      aria-hidden="true">{{ getReactionCount(reaction) }}</span>
  </div>
</div>
