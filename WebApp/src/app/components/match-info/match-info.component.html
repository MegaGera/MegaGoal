<div class="match-info-container" *ngIf="!loading && match">
  
  <!-- League Header Component -->
  <app-league-header 
    [leagueId]="match.league.id"
    [leagueName]="match.league.name"
    [leagueRound]="match.league.round"
    [leagueSeason]="match.league.season">
  </app-league-header>

  <!-- General Match Card Component -->
  <app-general-match-card [realMatch]="match"></app-general-match-card>

  <!-- Extra Time and Penalties (if applicable) -->
  <div class="score-details" *ngIf="match.score && (match.score.extratime.home !== null || match.score.penalty.home !== null)">
    <div class="score-row" *ngIf="match.score.extratime.home !== null">
      <span class="score-label">Extra Time:</span>
      <span class="score-value">{{ match.score.extratime.home }} - {{ match.score.extratime.away }}</span>
    </div>
    <div class="score-row" *ngIf="match.score.penalty.home !== null">
      <span class="score-label">Penalties:</span>
      <span class="score-value">{{ match.score.penalty.home }} - {{ match.score.penalty.away }}</span>
    </div>
  </div>

  <!-- Match Highlights Video Section -->
  <div class="highlights-section" *ngIf="isFinished() && highlightsVideo && highlightsVideo.videoId">
    <div class="video-container" *ngIf="loadingVideo">
      <div class="video-loading">
        <div class="spinner"></div>
      </div>
    </div>
    <div class="video-wrapper" *ngIf="!loadingVideo && highlightsVideo && highlightsVideo.videoId">
      <iframe 
        [src]="getSafeUrl(highlightsVideo.embedUrl)" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen
        class="youtube-embed">
      </iframe>
    </div>
  </div>

  <div class="view-toggle-card" *ngIf="isMobileView">
    <div class="view-toggle">
      <button class="toggle-btn" [class.active]="viewMode === 'statistics'" (click)="setView('statistics')">Statistics</button>
      <button class="toggle-btn" [class.active]="viewMode === 'events'" (click)="setView('events')">Events</button>
      <button class="toggle-btn" [class.active]="viewMode === 'lineups'" (click)="setView('lineups')">Lineups</button>
    </div>
  </div>

  <div class="mobile-tab-content" *ngIf="isMobileView">
    <div class="mobile-tab-pane" [class.show]="viewMode === 'events'">
      <h3 class="match-panel-title">Events</h3>
      <app-match-events 
        *ngIf="viewMode === 'events' && match.events"
        [events]="match.events"
        [homeTeamId]="match.teams.home.id"
        [awayTeamId]="match.teams.away.id"
        [homeTeamName]="match.teams.home.name"
        [awayTeamName]="match.teams.away.name">
      </app-match-events>
    </div>

    <div class="mobile-tab-pane" [class.show]="viewMode === 'statistics'">
      <h3 class="match-panel-title">Statistics</h3>
      <app-match-statistics
        *ngIf="viewMode === 'statistics' && homeStatistics && awayStatistics"
        [homeStatistics]="homeStatistics"
        [awayStatistics]="awayStatistics"
        [isAdmin]="isAdmin"
        [isFinished]="isFinished()"
        [isUpdating]="isUpdating"
        (updateStatistics)="updateStatistics()">
      </app-match-statistics>
    </div>

    <div class="mobile-tab-pane" [class.show]="viewMode === 'lineups'">
      <h3 class="match-panel-title">Lineups</h3>
      <app-match-lineups
        *ngIf="viewMode === 'lineups' && match.lineups"
        [lineups]="match.lineups"
        [events]="match.events || []"
        [homeTeamId]="match.teams.home.id"
        [awayTeamId]="match.teams.away.id">
      </app-match-lineups>
    </div>
  </div>

  <ng-container *ngIf="!isMobileView">
    <div class="desktop-main-row">
      <div class="desktop-column">
        <div class="match-panel-card">
          <h3 class="match-panel-title">Statistics</h3>
          <app-match-statistics
            *ngIf="homeStatistics && awayStatistics"
            [homeStatistics]="homeStatistics"
            [awayStatistics]="awayStatistics"
            [isAdmin]="isAdmin"
            [isFinished]="isFinished()"
            [isUpdating]="isUpdating"
            (updateStatistics)="updateStatistics()">
          </app-match-statistics>
        </div>
      </div>

      <div class="desktop-column">
        <div class="match-panel-card">
          <h3 class="match-panel-title">Events</h3>
          <app-match-events 
            *ngIf="match.events"
            [events]="match.events"
            [homeTeamId]="match.teams.home.id"
            [awayTeamId]="match.teams.away.id"
            [homeTeamName]="match.teams.home.name"
            [awayTeamName]="match.teams.away.name">
          </app-match-events>
        </div>
      </div>

      <div class="desktop-column">
        <div class="match-panel-card">
          <h3 class="match-panel-title">Lineups</h3>
          <app-match-lineups
            *ngIf="match.lineups"
            [lineups]="match.lineups"
            [events]="match.events || []"
            [homeTeamId]="match.teams.home.id"
            [awayTeamId]="match.teams.away.id">
          </app-match-lineups>
        </div>
      </div>
    </div>
  </ng-container>

</div>

<!-- Loading State -->
<div class="loading-container" *ngIf="loading">
  <div class="spinner"></div>
  <p>Loading match information...</p>
</div>
