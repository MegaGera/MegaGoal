<div class="lineups-section" *ngIf="lineups && lineups.length > 0">
  <h2 class="section-title">Lineups</h2>
  
  <div class="lineups-container">
    <!-- Home Team -->
    <div class="team-lineup" *ngIf="getHomeLineup() as homeLineup">
      <div class="teams-header-row">
        <div class="team-header-half team-header-home lineup-team-header">
          <app-match-team-header
            [teamId]="homeLineup.team.id"
            [teamName]="homeLineup.team.name"
            side="home">
          </app-match-team-header>
          <span class="formation-badge" *ngIf="homeLineup.formation">{{ homeLineup.formation }}</span>
        </div>
      </div>

      <div class="players-section" *ngIf="canRenderField(homeLineup); else homeListMode">
        <app-lineup-pitch [rows]="getFieldRows(homeLineup)"></app-lineup-pitch>

        <div class="players-list players-list-unplaced" *ngIf="getUnplacedStartXI(homeLineup).length > 0">
          <h5 class="unplaced-title">Players without grid position</h5>
          <app-player-item
            *ngFor="let player of getUnplacedStartXI(homeLineup)"
            [player]="player.player"
            [isSubstitute]="false">
          </app-player-item>
        </div>
      </div>

      <ng-template #homeListMode>
        <div class="players-section">
          <div class="players-list">
            <app-player-item
              *ngFor="let player of homeLineup.startXI"
              [player]="player.player"
              [isSubstitute]="false">
            </app-player-item>
          </div>
        </div>
      </ng-template>

      <!-- Coach -->
      <div class="coach-section" *ngIf="homeLineup.coach?.name">
        <div class="coach-item">
          <span class="coach-label">Coach:</span>
          <span class="coach-name">{{ homeLineup.coach?.name }}</span>
        </div>
      </div>

      <!-- Substitutes -->
      <div class="players-section" *ngIf="homeLineup.substitutes && homeLineup.substitutes.length > 0">
        <h4 class="section-subtitle">Substitutes</h4>
        <div class="players-list">
          <app-player-item 
            *ngFor="let player of homeLineup.substitutes"
            [player]="player.player"
            [isSubstitute]="true">
          </app-player-item>
        </div>
      </div>
    </div>

    <!-- Away Team -->
    <div class="team-lineup" *ngIf="getAwayLineup() as awayLineup">
      <div class="teams-header-row">
        <div class="team-header-half team-header-away lineup-team-header">
          <app-match-team-header
            [teamId]="awayLineup.team.id"
            [teamName]="awayLineup.team.name"
            side="away">
          </app-match-team-header>
          <span class="formation-badge" *ngIf="awayLineup.formation">{{ awayLineup.formation }}</span>
        </div>
      </div>

      <div class="players-section" *ngIf="canRenderField(awayLineup); else awayListMode">
        <app-lineup-pitch [rows]="getFieldRows(awayLineup)"></app-lineup-pitch>

        <div class="players-list players-list-unplaced" *ngIf="getUnplacedStartXI(awayLineup).length > 0">
          <h5 class="unplaced-title">Players without grid position</h5>
          <app-player-item
            *ngFor="let player of getUnplacedStartXI(awayLineup)"
            [player]="player.player"
            [isSubstitute]="false">
          </app-player-item>
        </div>
      </div>

      <ng-template #awayListMode>
        <div class="players-section">
          <div class="players-list">
            <app-player-item
              *ngFor="let player of awayLineup.startXI"
              [player]="player.player"
              [isSubstitute]="false">
            </app-player-item>
          </div>
        </div>
      </ng-template>

      <!-- Coach -->
      <div class="coach-section" *ngIf="awayLineup.coach?.name">
        <div class="coach-item">
          <span class="coach-label">Coach:</span>
          <span class="coach-name">{{ awayLineup.coach?.name }}</span>
        </div>
      </div>

      <!-- Substitutes -->
      <div class="players-section" *ngIf="awayLineup.substitutes && awayLineup.substitutes.length > 0">
        <h4 class="section-subtitle">Substitutes</h4>
        <div class="players-list">
          <app-player-item 
            *ngFor="let player of awayLineup.substitutes"
            [player]="player.player"
            [isSubstitute]="true">
          </app-player-item>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- No Lineups Message -->
<div class="no-lineups" *ngIf="!lineups || lineups.length === 0">
  <p>No lineups available for this match</p>
</div>
